<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITFAB S.A.C. - Mi Perfil</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../public/css/styles.css">
    <style>
        /* Mobile-first specific overrides */
        body {
            background-color: #f1f5f9; /* Slate 100 */
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .qr-container {
            display: inline-block;
            padding: 15px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin: 0.5rem auto;
        }
        /* Style for the qr code image to be responsive but not too big */
        #qrcode img {
            margin: 0 auto;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- Navbar Superior -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="./socio.html">
                <div class="bg-primary text-white rounded d-inline-flex justify-content-center align-items-center me-2 shadow-sm" style="width: 32px; height: 32px;">
                    <i class="fa-solid fa-dumbbell fs-6"></i>
                </div>
                FITFAB
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSocio" aria-controls="navbarSocio" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSocio">
                <ul class="navbar-nav ms-auto mt-3 mt-lg-0 gap-2 text-center text-lg-start">
                    <li class="nav-item">
                        <a class="nav-link active fw-medium px-3 py-2 rounded bg-primary bg-opacity-25" href="./socio.html">
                            <i class="fa-solid fa-qrcode me-2"></i> Mi QR
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-medium px-3 py-2" href="./socio_clases.html">
                            <i class="fa-regular fa-calendar-check me-2"></i> Reservar Clases
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-medium px-3 py-2" href="./socio_pagos.html">
                            <i class="fa-solid fa-file-invoice-dollar me-2"></i> Mis Pagos
                        </a>
                    </li>
                    <li class="nav-item mt-2 mt-lg-0 border-top border-secondary pt-2 pt-lg-0 border-lg-0">
                        <a class="nav-link fw-medium text-danger px-3 py-2" href="#">
                            <i class="fa-solid fa-right-from-bracket me-2"></i> Cerrar Sesión
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content (Mobile Centric) -->
    <main class="container py-4 py-md-5 d-flex justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4 px-1 px-sm-3">
                
                <!-- Tarjeta Principal: Mi Acceso -->
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden text-center mt-4">
                    <!-- Decoración superior azul -->
                    <div class="bg-primary text-white pt-4 pb-5 position-relative">
                        <h6 class="fw-bold m-0 letter-spacing-1"><i class="fa-solid fa-id-card-clip me-2"></i> PASE DE ACCESO</h6>
                    </div>
                    
                    <div class="card-body px-4 pt-4 pb-4 position-relative">
                        <!-- Avatar superpuesto (se alinea con la intersección) -->
                        <div class="position-absolute top-0 start-50 translate-middle">
                            <img src="https://ui-avatars.com/api/?name=Carlos+Mendoza&background=f8fafc&color=0d6efd&rounded=true&size=120" alt="Avatar Socio" class="rounded-circle border border-4 border-white shadow-sm" style="width: 80px; height: 80px; background: white;">
                        </div>
                        
                        <!-- Datos del Socio -->
                        <div class="mt-4 mb-4">
                            <h4 class="fw-bold text-gray-800 mb-1">Carlos Mendoza</h4>
                            <p class="text-muted mb-3 fw-medium small">Socio #12345</p>
                            
                            <!-- Badge de Estado -->
                            <div class="d-inline-block bg-success bg-opacity-10 px-4 py-2 rounded-pill border border-success border-opacity-25 mb-3 shadow-sm">
                                <span class="fw-bold text-success fs-6"><i class="fa-solid fa-circle-check me-2"></i> Membresía Activa</span>
                            </div>
                        </div>

                        <!-- Detalles Plan -->
                        <div class="bg-light rounded-4 p-3 mb-4 text-start border shadow-sm">
                            <div class="d-flex justify-content-between mb-2 pb-2 border-bottom">
                                <span class="text-muted fw-semibold small"><i class="fa-solid fa-crown text-warning me-1"></i> Plan</span>
                                <span class="fw-bold text-dark small">Mensual Ilimitado</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="text-muted fw-semibold small"><i class="fa-regular fa-calendar text-primary me-1"></i> Vencimiento</span>
                                <span class="fw-bold text-dark small">15 Jun 2026</span>
                            </div>
                        </div>
                        
                        <!-- Contenedor QR -->
                        <p class="text-muted small fw-semibold mb-2 mt-4 text-uppercase">Tu Código de Ingreso</p>
                        <div class="qr-container bg-white border border-light">
                            <!-- El QR se dibuja aquí -->
                            <div id="qrcode"></div>
                        </div>
                        <p class="text-muted mt-3 mb-0" style="font-size: 0.75rem;"><i class="fa-solid fa-rotate text-primary me-1"></i> Válido para acceso automático en recepción.</p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- QRCode.js Librería -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script src="../../public/js/shared/api.js"></script>
    <script src="../../public/js/shared/auth.js"></script>
    <script src="../../public/js/shared/utils.js"></script>
    <script src="../../public/js/socio/perfil.js"></script>
</body>
</html>
