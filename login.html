<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITFAB S.A.C. - Login Staff</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos modulares -->
    <link rel="stylesheet" href="public/css/login.css">
</head>
<body class="bg-image bg-staff">

    <div class="container px-3 d-flex justify-content-center">
        <!-- Tarjeta de Login -->
        <div class="login-card">
            
            <div class="logo-circle logo-staff">
                <i class="fa-solid fa-dumbbell"></i>
            </div>
            
            <div class="text-center mb-4">
                <h4 class="fw-bold mb-1" style="letter-spacing: 1px;">FITFAB S.A.C.</h4>
                <p class="mb-0 text-secondary small text-uppercase fw-bold" style="letter-spacing: 2px;">Portal del Staff</p>
            </div>

            <div class="login-body">
                <form id="formLogin">
                    <div class="mb-4">
                        <label for="email" class="form-label fw-bold text-secondary small text-uppercase" style="letter-spacing: 0.5px;">Correo Electrónico</label>
                        <div class="input-group input-group-lg shadow-sm rounded-3 overflow-hidden">
                            <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                            <input type="email" class="form-control fs-6" id="email" placeholder="usuario@fitfab.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold text-secondary small text-uppercase" style="letter-spacing: 0.5px;">Contraseña</label>
                        <div class="input-group input-group-lg shadow-sm rounded-3 overflow-hidden">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" class="form-control fs-6" id="password" placeholder="••••••••" required>
                            <!-- Botón de ojito -->
                            <span class="input-group-text password-toggle" id="togglePassword">
                                <i class="fa-regular fa-eye" id="eyeIcon"></i>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 btn-login shadow-sm mt-3">
                        Iniciar Sesión <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </form>

                <!-- Enlace de recuperación -->
                <div class="text-center mt-4">
                    <a href="#" class="text-decoration-none text-muted small fw-medium" onclick="alert('Contacte a Soporte de TI o al Gerente para recuperar sus credenciales.')">
                        <i class="fa-solid fa-circle-question me-1"></i> ¿Olvidaste tu contraseña? Contacta al administrador.
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="public/js/shared/api.js"></script>
<script src="public/js/shared/auth.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {

        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            if (type === 'text') {
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });

        const formLogin = document.getElementById('formLogin');

        formLogin.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const btnSubmit = formLogin.querySelector('button[type="submit"]');
            const originalText = btnSubmit.innerHTML;

            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Autenticando...';
            btnSubmit.disabled = true;

            try {
                const data = await loginStaff(email, password);

                btnSubmit.innerHTML = '<i class="fa-solid fa-check me-2"></i> OK';
                btnSubmit.classList.remove('btn-primary');
                btnSubmit.classList.add('btn-success');

                setTimeout(() => redirectByRole(), 600);

            } catch (err) {
                btnSubmit.innerHTML = originalText;
                btnSubmit.disabled = false;

                const errorDiv = document.createElement('div');
                errorDiv.className = 'alert alert-danger mt-3 py-2 text-center';
                errorDiv.textContent = err.message;
                errorDiv.id = 'loginError';

                const existingError = document.getElementById('loginError');
                if (existingError) existingError.remove();

                formLogin.parentNode.insertBefore(errorDiv, formLogin.nextSibling);

                setTimeout(() => {
                    const errEl = document.getElementById('loginError');
                    if (errEl) errEl.remove();
                }, 4000);
            }
        });
    });
</script>
</body>
</html>
